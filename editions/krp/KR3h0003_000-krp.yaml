body:
  text: 續畫品并序陳姚最撰夫丹青妙極未易言盡雖質沿古意而文變今情立萬象於胸懐傳千祀於毫翰故九樓之上備表仙靈四門之墉廣圖賢聖雲閣興拜伏之感掖庭致聘遠之别凡斯緬邈厥迹難詳今之存者或其人㝠滅自非淵識博見熟究精麄擯落蹄筌方窮致理但事有否泰人經盛衰或弱齡而價重或壯齒而聲遒故前後相形優劣舛錯至如長康之美擅髙徃䇿矯然獨步終始無雙有若神明非庸識之所能傚如負日月豈末學之所能窺荀衞曹張方之蔑矣分庭抗禮未見其人謝陸聲過於實良可於邑列於下品尤所未安斯乃情有抑揚畫無善惡始信曲髙和寡非直名謳泣血謬題寧止良璞將恐疇訪理絶永成淪喪聊舉一隅庶同三益夫調墨染翰志存精謹課兹有限應彼無方燧變墨回治㸃不息眼眩素縟意猶未盡輕重微異則妍鄙革形絲髮不從則歡慘殊觀加以頃來容服一月三改首尾未周俄成古拙欲臻其妙不亦難乎豈可曽未涉川遽云越海俄覩魚鼈謂察蛟龍凡厥等曹未足與言畫矣陳思王云傳出文士圖生巧夫性尚分流事難兼善躡方趾之迹易不知圓行之步難遇象谷之風翔莫測吕梁之水蹈雖欲游刃理觧終迷空慕落塵未全識曲若永尋河書則圖在書前取譬連山則言由象著今莫不貴斯鳥跡而賤彼龍文消長相傾有自來矣故倕斷其指巧不可為杖䇿坐忘既慚經國據梧喪偶寧足命家若惡居下流自可焚筆若㝠心用舍幸從所好戲陳鄙見非謂毁譽十室難誣佇聞多識今之所載竝謝赫所遺猶若文章止於兩卷其中道有可采使成一家之集且古今書評髙下必銓解畫無多是故備取人數既少不復區别其優劣可以意求也湘東殿下梁元帝初封湘東王嘗畫芙蓉湖醮鼎圖右天挺命世幼禀生知學窮性表心師造化非復景行所能希涉畫有六法真仙為難王於象人特盡神妙心敏手運不加㸃治斯乃聽訟部領之隙文談衆藝之餘時復遇物援毫造次驚絶足使荀衞閣筆袁陸韜翰圖製雖寡聲聞於外非復討論木訥可得而稱焉劉璞右𦙍祖之子少習門風至老筆法不渝前制體韻精研亞於其父信代有其人兹名不墮矣沈標右雖無偏擅觸類皆涉性尚鉛華甚能留意雖未臻全美殊有可觀謝赫右寫貌人物不俟對看所須一覽便工操筆㸃刷研精意在切似目想毫髮皆無遺失麗服靚粧隨時變改直睂曲髩與世事新别體細微多自赫始遂使委巷逐末皆類效顰至於氣運精靈未窮生動之致筆路纎弱不副壯雅之懐然中興以後象人莫及毛惠秀右其於繪事頗為詳悉太自矜持翻成羸鈍遒勁不及惠遠委曲有過於稜蕭賁右雅性精宻後來難尚含毫命素動必依真嘗畫團扇上為山川咫尺之内而瞻萬里之遙方寸之中乃辯千尋之峻學不為人自娛而已雖有好事罕見其迹沈粲右筆迹調媚專工綺羅屏障所圖頗有情趣張僧繇五代梁時吳興人右善圖塔廟超越羣工朝衣野服今古不失竒形異貌殊方夷夏實參其妙俾晝作夜未嘗厭怠惟公及私手不揮筆但數紀之内無須㬰之閒然聖賢曬矚小乏神氣豈可求備於一人雖云晩出殆亞前品陸肅一木作宏肅右綏之弟早藉趨庭之教未盡敦閲之勤雖復所得不多猶有名家之法方效輪扁甘苦難投毛稜惠秀姪右惠遠之子便捷有餘真巧不足善於布置畧不煩草若比方諸父則牀上安牀嵇寶鈞聶松右二人無的師範而意兼真俗賦彩鮮麗觀者悦情若辯其優劣則僧繇之亞焦寶願右雖早游張謝而靳固不傳旁求造請事均盗道之法殫極斲輪遂至兼採之勤衣文樹色時表新異㸃黛施朱重輕不失雖未窮秋駕而見賞春坊輸奏薄伎謬得其地今衣冠緒裔未聞好學丹青道堙良足為慨袁質右蒨之子風神俊爽不墜家聲始逾志學之年便嬰痟癎之病曾見草莊周木鴈卞和抱璞兩圖筆勢遒正繼父之美若方之體物則伯仁龍馬之頌比之書翰則長康狸骨之力雖復語迹異途而妙理同歸一致苖而不實有足悲者無名之貴諒在斯人釋僧珎釋僧覺右珎蘧道愍之甥覺姚曇度之子竝弱年漸漬親承訓朂珎乃易於酷似覺豈難負析薪染服之中有斯二道若品其工拙盖嵇聶之流釋迦佛陀吉底俱摩羅菩提右此數手竝外國比丘既華戎殊體無以定其差品光宅威公雅躭好此法下筆之妙頗為京洛所知聞解蒨右全法章蘧筆力不逮通變巧㨗寺壁最長續畫品
