body:
  text: 後畫品録湘東殿下右天挺命世幼稟生知學窮性表心師造化非復景行所能希涉畫有六法真仙為難王於像人特盡神妙心敏手運不加點治斯乃聽訟部領之隙文談衆藝之餘時復遇物援毫造次驚絶足使荀衛閣筆袁陸韜翰圖製雖寡聲聞於外非復討論木訥可得而稱焉劉璞右胤祖之子少習門風至老筆法不渝前制體韻精研亞於其父信代有其人茲名不墜矣沈標右雖無偏擅觸類皆涉性尚鉛華甚能留意雖未臻全美殊有可觀謝赫右寫貌人物不俟對看所須一覽便工操筆點刷研精意在切似目想毫髮皆無遺失麗服靚妝隨時變改直眉曲鬢與世事新別體細微多自赫始遂使委巷逐末皆類效顰至於氣韻精靈未窮生動之致筆路纖弱不副壯雅之懷中興以後象人莫及毛惠秀右其於繪事頗為詳悉太自矜持番成羸鈍遒徑不及惠遠委曲有過於稜蕭賁右稚性精密後來難尚含毫命素動必依真嘗畫團扇上為山川咫尺之內而贍萬里之遙方寸之中乃辨千尋之峻學不為人自娛而已雖有好事罕見其迹沈粲右筆迹調媚專工綺羅屏幛所圖頗有情趣張僧繇右善圖塔廟超越群工朝衣野服今古不失奇形殊貌殊方夷夏實參其妙俾晝作夜未嘗厭怠惟公及私手不停筆但數紀之內無須臾之間然聖賢曬曯小乏神氣豈可求備於一人雖云晚出殆亞前品陸肅右綏之弟早藉趨庭之教未盡敦閲之勤雖復所得不多猶有名家之法方效輪扁甘苦難投毛稜右惠遠之子便捷有餘真巧不足善於布置略不煩草若比方諸父則床上安床嵇寶鈞聶松右二人無的師範而意兼真俗賦彩鮮麗觀者悅情若辨其優劣則僧繇之亞焦寶願右雖早遊張謝而靳固不傳旁求造請事均盜道之法殫極斫輪遂至兼採之勤衣文樹色時表新異點黛施朱重輕不失雖未窮秋駕而見賞春坊輸奏薄伎謬得其地今衣冠緒裔未聞好學丹青道堙良足為慨袁質右蒨之子風神俊爽不墜家聲始逾志學之年便嬰痟癇之病曾見草莊周木雁卞和抱璞兩圖筆勢遒正繼父之美若方之體物則伯仁龍馬之頌比之書翰則長胤狸骨之方雖復語迹異途而妙埋同歸一致苗而不實有足悲者無名之實諒在斯人釋僧珍釋僧覺右珍蘧道愍之甥覺姚曇度之子並弱年漸漬親承訓勗珍乃易於酷似覺豈難負析薪染服之中有斯二道若品其工拙蓋嵇聶之流釋迦佛陀吉底俱摩羅菩提右此數手並外國比丘既華戎殊體無以定其差品光宅威公雅耽好此法下筆之妙頗為京洛所知聞解蒨右全法章蘧筆力不逮通變巧捷寺壁最長
